<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hora, Fecha y Clima</title>

<style>
body {
  margin: 0;
  background: #000;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.container {
  position: absolute;
  top: 0;
  left: 0;
  width: 3840px;
  height: 2160px;

  transform-origin: top left;

  /* 🔥 AJUSTE FINO */
  transform: scaleY(0.97); /* prueba entre 0.96 y 0.99 */
}

#fondoImagen {
  position: absolute;
  top: 0;
  left: 0;
  width: 3840px;
  height: 2160px;
}

.time {
  position: absolute;
  top: 30%;
  left: 25%;
  transform: translate(-50%, -50%);
  font-size: 250px;
  font-weight: bold;
  color: white;
}

.day-name {
  position: absolute;
  top: 47%;
  left: 25%;
  transform: translate(-50%, -50%);
  font-size: 200px;
  font-weight: bold;
  color: #409fee;
}

.date {
  position: absolute;
  top: 60%;
  left: 25%;
  transform: translate(-50%, -50%);
  font-size: 150px;
  font-weight: bold;
  color: #409fee;
  white-space: nowrap;
}

.weather-icon-big {
  position: absolute;
  top: 61%;
  left: 75%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 400px;
}

.weather {
  position: absolute;
  top: 44%;
  left: 75%;
  transform: translate(-50%, -50%);
  font-size: 250px;
  font-weight: bold;
  color: black;
}

.weather-description {
  position: absolute;
  top: 79%;
  left: 76%;
  transform: translate(-50%, -50%);
  font-size: 120px;
  color: #409fee;
}
</style>
</head>

<body>
<div class="container">

<img id="fondoImagen" src="CLIMADIA.png" />

<div id="clock" class="time"></div>
<div id="dayName" class="day-name"></div>
<div id="date" class="date"></div>

<img id="weatherIconBig" class="weather-icon-big" src="Iconos/Soleado.svg" />

<div id="weather" class="weather"></div>
<div id="weatherText" class="weather-description"></div>

</div>

<script>

/* ========================
RELOJ
======================== */

function updateClock() {
  const now = new Date();

  const hours = String(now.getHours()).padStart(2, "0");
  const minutes = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("clock").textContent = `${hours}:${minutes}`;

  const days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  document.getElementById("dayName").innerHTML = days[now.getDay()];
  document.getElementById("date").textContent = `${now.getDate()} de ${months[now.getMonth()]}`;
}

/* ========================
FONDO DIA / NOCHE
======================== */

function updateBackgroundImage() {
  const hour = new Date().getHours();
  const fondo = document.getElementById("fondoImagen");

  if (hour >= 18 || hour < 6) {
    fondo.src = "CLIMANOCHE.png";
  } else {
    fondo.src = "CLIMADIA.png";
  }
}

/* ========================
ICONOS AGRUPADOS
======================== */

function getWeatherIcon(weatherId, iconCode) {

  const isNight = iconCode.includes("n");

  // Tormenta
  if (weatherId >= 200 && weatherId < 300) {
    return "Iconos/Tormenta.svg";
  }

  // Lluvia y llovizna
  if (weatherId >= 300 && weatherId < 600) {
    return "Iconos/Lluvia.svg";
  }

  // Vientos fuertes
  if (weatherId === 771) {
    return "Iconos/Vientos fuertes.svg";
  }

  // Niebla / bruma / atmósfera
  if (weatherId >= 700 && weatherId < 800) {
    return isNight
      ? "Iconos/Nublado(noche).svg"
      : "Iconos/Nublado.svg";
  }

  // Cielo despejado
  if (weatherId === 800) {
    return isNight
      ? "Iconos/Despejado(Noche).svg"
      : "Iconos/Soleado.svg";
  }

  // Nubes
  if (weatherId > 800) {
    return isNight
      ? "Iconos/Nublado(noche).svg"
      : "Iconos/Nublado.svg";
  }

  // Fallback
  return isNight
    ? "Iconos/Despejado(Noche).svg"
    : "Iconos/Soleado.svg";
}

/* ========================
CLIMA
======================== */

async function fetchWeather() {

  const apiKey = "65fd2c24a1679d15f7b59502783522f7";
  const city = "Bogotá";

  const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=es`;

  try {

    const response = await fetch(url);
    const data = await response.json();

    const temperature = Math.round(data.main.temp);
    const description = data.weather[0].description;
    const weatherId = data.weather[0].id;
    const iconCode = data.weather[0].icon;

    const iconPath = getWeatherIcon(weatherId, iconCode);

    document.getElementById("weather").textContent = `${temperature}°C`;
    const capitalizedDescription = description.charAt(0).toUpperCase() + description.slice(1);

document.getElementById("weatherText").textContent = capitalizedDescription;

    const iconElement = document.getElementById("weatherIconBig");

    if (iconElement.src !== iconPath) {
      iconElement.src = iconPath;
    }

  } catch (error) {
    document.getElementById("weather").textContent = "--";
    console.error("Error clima:", error);
  }
}

/* ========================
INIT
======================== */

updateClock();
setInterval(updateClock, 1000);

updateBackgroundImage();
setInterval(updateBackgroundImage, 300000);

fetchWeather();
setInterval(fetchWeather, 600000);

 
</script>

</body>
</html>
